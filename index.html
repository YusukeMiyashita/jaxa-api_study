<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JAXA Earth API - 地球の温度</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="jaxa-api.js"></script>
</head>
<body>
    <header class="header">
        <h1>地球の温度</h1>
    </header>

    <main class="main">
        <!-- 読み込み状況 -->
        <section class="loading">
            <progress id="progress" value="0" max="100"></progress>
            <span id="message" class="message"></span>
        </section>

        <!-- レイヤー切替 -->
        <section class="controls">
            <label>
                <input type="checkbox" id="lst">
                地表面温度 (LST)
            </label>
            <label>
                <input type="checkbox" id="sst">
                海面温度 (SST)
            </label>
        </section>

        <!-- 3Dビューと角度調整 -->
        <div class="viewer-container">
            <div class="angle-left">
                <label class="angle-control">
                    <span>垂直角度</span>
                    <input type="range" id="vAngle" value="0" min="-90" max="90">
                </label>
            </div>
            <div id="renderArea" class="viewer"></div>
            <div class="angle-bottom">
                <label class="angle-control">
                    <span>水平角度</span>
                    <input type="range" id="hAngle" value="0" min="-90" max="90">
                </label>
            </div>
        </div>

        <!-- 選択した地点のデータ -->
        <section class="data-display">
            <span id="data"></span>
        </section>
    </main>
</body>
</html>
